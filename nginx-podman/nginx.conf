events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    client_max_body_size 10M;

    server {
        listen 80;
        server_name 38.247.187.241;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name 38.247.187.241;

        # The SSL certs mapped into the container
        ssl_certificate /etc/nginx/ssl/obdet.crt;
        ssl_certificate_key /etc/nginx/ssl/obdet.key;

        # --------- Frontend /dist Static Serving ---------
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # --------- API & Backend Routes ---------
        # Since we use --network host, the container can access localhost:8000
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /video_feed {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
        }

        location /snapshot {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
        }

        location /public_video_feed {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
        }

        location /socket.io/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /ws/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }
    }
}
